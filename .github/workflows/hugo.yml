# GitHub Actions workflow: build and deploy Hugo site to GitHub Pages
# Based on the official Hugo-hosting-on-GitHub-Pages guide
# https://gohugo.io/host-and-deploy/host-on-github/

name: Deploy Hugo site to Pages

on:
  push:
    branches: [main]
  workflow_dispatch:   # Allow manual runs from Actions tab

# Permissions needed for GitHub Pages deployment
permissions:
  contents: read
  pages: write
  id-token: write

# Allow only one concurrent deployment
concurrency:
  group: "pages"
  cancel-in-progress: true

defaults:
  run:
    shell: bash

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      HUGO_VERSION: 0.163.0
    steps:
      - name: Install Hugo
        run: |
          wget -O hugo.deb https://github.com/gohugoio/hugo/releases/download/v${HUGO_VERSION}/hugo_extended_${HUGO_VERSION}_linux-amd64.deb
          sudo dpkg -i hugo.deb

      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0    # Hugo needs full history for .GitInfo dates

      - name: Setup Pages
        id: pages
        uses: actions/configure-pages@v5

      - name: Build with Hugo
        env:
          HUGO_ENV: production
          HUGO_CACHEDIR: /tmp/.hugo-cache
        run: |
          hugo \
            --minify \
            --baseURL "https://l0cky12.github.io/liam-portfolio/" \
            --destination "public"

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: public

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
