{{ define "main" }}
<section class="hero">
  <div class="hero-content">
    <h1 class="hero-name">Hi, I'm Liam Decareaux</h1>
    <p class="hero-role">{{ .Site.Params.role }}</p>

    <div class="hero-buttons">
      <a href="{{ " /blog " | absURL }}" class="btn btn-primary">Read the Blog</a>
      <a href="{{ " /about " | absURL }}" class="btn btn-secondary">About Me</a>
      <a href="{{ " /contact " | absURL }}" class="btn btn-outline">Get in Touch</a>
    </div>
  </div>
</section>

<section class="recent-posts">
  <h2>Recent Posts</h2>
  <div class="post-list">
    {{ range first 3 (where .Site.RegularPages "Section" "==" "blog") }}
      {{ partial "blog-card.html" . }}
    {{ end }}
  </div>
  <p class="see-all"><a href="{{ " /blog " | absURL }}">View all posts &rarr;</a></p>
</section>
{{ end }}
