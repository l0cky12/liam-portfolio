<style>
/* Dark is the default (root vars) */
:root{
  --bg:#0d1117; --surface:#161b22; --border:#30363d;
  --text:#e6edf3; --text-muted:#8b949e; --accent:#58a6ff;
  --accent-hover:#79c0ff; --code-bg:#1f2428;
}
/* Light mode: explicit toggle via [data-theme="light"] */
:root[data-theme="light"]{
  --bg:#ffffff; --surface:#f6f8fa; --border:#d0d7de;
  --text:#1f2328; --text-muted:#656d76; --accent:#0969da;
  --accent-hover:#218bff; --code-bg:#eff1f3;
}
/* Light mode: auto via OS preference when no explicit choice */
@media (prefers-color-scheme: light){
  :root:not([data-theme]){
    --bg:#ffffff; --surface:#f6f8fa; --border:#d0d7de;
    --text:#1f2328; --text-muted:#656d76; --accent:#0969da;
    --accent-hover:#218bff; --code-bg:#eff1f3;
  }
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html{font-size:16px;scroll-behavior:smooth}
body{
  font-family:'Inter',-apple-system,BlinkMacSystemFont,'Segoe UI',HelveticaArialsans-serif;
  background:var(--bg);color:var(--text);line-height:1.6;
  min-height:100vh;display:flex;flex-direction:column;
}
a{color:var(--accent);text-decoration:none}
a:hover{color:var(--accent-hover);text-decoration:underline}
.container{max-width:960px;margin:0 auto;padding:0 1.5rem;width:100%}

/* ── Header ── */
.site-header{border-bottom:1px solid var(--border);background:var(--surface);position:sticky;top:0;z-index:10}
.site-header .container{display:flex;align-items:center;justify-content:space-between;height:56px}
.logo{font-weight:700;font-size:1.1rem;color:var(--text)}
.nav-wrapper{display:flex;align-items:center;gap:1.5rem}
.nav{display:flex;gap:1.5rem}
.nav a{color:var(--text-muted);font-weight:500;font-size:.95rem}
.nav a.active,.nav a:hover{color:var(--text);text-decoration:none}
.nav-toggle{display:none;flex-direction:column;gap:4px;background:none;border:none;cursor:pointer}
.nav-toggle span{width:20px;height:2px;background:var(--text);border-radius:2px}

/* ── Theme toggle ── */
.theme-toggle{
  background:none;border:1px solid var(--border);border-radius:8px;
  padding:.4rem;cursor:pointer;color:var(--text-muted);
  display:flex;align-items:center;justify-content:center;transition:all .15s
}
.theme-toggle:hover{border-color:var(--accent);color:var(--accent)}
.theme-toggle .icon-sun{display:none}
.theme-toggle .icon-moon{display:block}
:root[data-theme="light"] .theme-toggle .icon-sun{display:block}
:root[data-theme="light"] .theme-toggle .icon-moon{display:none}
@media (prefers-color-scheme: light){
  :root:not([data-theme]) .theme-toggle .icon-sun{display:block}
  :root:not([data-theme]) .theme-toggle .icon-moon{display:none}
}

/* ── Main ── */
main{flex:1;display:block}

/* ── Hero ── */
.hero{padding:4rem 0 3rem;text-align:center}
.hero-name{font-size:2.5rem;font-weight:700;margin-bottom:.5rem}
.hero-role{font-size:1.25rem;color:var(--accent);margin-bottom:1rem}
.hero-tagline{font-size:1.1rem;color:var(--text-muted);max-width:600px;margin:0 auto 1.5rem}
.hero-intro{max-width:560px;margin:0 auto 2rem;color:var(--text-muted);font-size:1.05rem}
.hero-buttons{display:flex;gap:1rem;justify-content:center;flex-wrap:wrap}
.btn{padding:.7rem 1.5rem;border-radius:8px;font-weight:600;font-size:.95rem;transition:all .15s}
.btn-primary{background:var(--accent);color:#fff}
.btn-primary:hover{background:var(--accent-hover);text-decoration:none;color:#fff}
.btn-secondary{background:transparent;color:var(--accent);border:1px solid var(--accent)}
.btn-secondary:hover{background:var(--accent);color:#fff;text-decoration:none}
.btn-outline{background:transparent;color:var(--text-muted);border:1px solid var(--border)}
.btn-outline:hover{border-color:var(--accent);color:var(--accent);text-decoration:none}

/* ── Recent posts / post list ── */
.recent-posts,.post-list,.static-page,.single-post,.page-header{
  max-width:960px;margin:0 auto;padding:0 1.5rem
}
.recent-posts h2,.page-header h1{margin:2rem 0 1.5rem;font-size:1.5rem}
.post-list{display:flex;flex-direction:column;gap:1.5rem}
.see-all{text-align:center;margin-top:1.5rem}

/* ── Blog card ── */
.blog-card{
  background:var(--surface);border:1px solid var(--border);border-radius:8px;
  padding:1.5rem;transition:border-color .15s
}
.blog-card:hover{border-color:var(--accent)}
.card-date{font-size:.85rem;color:var(--text-muted);margin-bottom:.5rem}
.card-title{font-size:1.25rem;margin-bottom:.5rem}
.card-title a{color:var(--text)}
.card-title a:hover{color:var(--accent);text-decoration:none}
.card-summary{color:var(--text-muted);font-size:.95rem}

/* ── Single post ── */
.single-post{max-width:760px;margin:0 auto;padding:2rem 1.5rem}
.post-header{margin-bottom:2rem}
.post-date{font-size:.9rem;color:var(--text-muted);margin-bottom:.25rem}
.post-title{font-size:2rem;margin-bottom:.5rem}
.post-summary{font-size:1.1rem;color:var(--text-muted)}
.post-body{font-size:1.05rem;line-height:1.8}
.post-body h2{margin:2rem 0 .5rem;font-size:1.4rem}
.post-body h3{margin:1.5rem 0 .5rem;font-size:1.2rem}
.post-body p{margin-bottom:1rem}
.post-body ul,.post-body ol{margin-bottom:1rem;padding-left:2rem}
.post-body li{margin-bottom:.25rem}
.post-body code{
  background:var(--code-bg);padding:.15rem .4rem;border-radius:4px;
  font-size:.9em;font-family:'Fira Code',monospace
}
.post-body pre{
  background:var(--code-bg);border:1px solid var(--border);border-radius:8px;
  padding:1rem;overflow-x:auto;margin-bottom:1rem;color:var(--text)
}
.post-body pre code{background:none;padding:0;color:inherit}
/* Chroma wrapper — our CSS var bg wins over any chroma defaults */
.post-body pre .chroma{background:transparent!important;color:var(--text)!important}
.post-body blockquote{
  border-left:3px solid var(--accent);padding-left:1rem;
  color:var(--text-muted);font-style:italic;margin-bottom:1rem
}

/* ── Post navigation ── */
.post-nav{
  display:flex;justify-content:space-between;
  margin-top:3rem;padding-top:1.5rem;border-top:1px solid var(--border)
}
.post-nav .prev,.post-nav .next{font-size:.9rem}

/* ── Static pages (about, contact) ── */
.static-page{max-width:760px;margin:0 auto;padding:2rem 1.5rem}
.page-title{font-size:2rem;margin-bottom:1.5rem}

/* ── Contact links ── */
.contact-links{display:flex;gap:1.5rem;margin-top:1.5rem;flex-wrap:wrap}
.contact-links a{
  display:inline-flex;align-items:center;gap:.5rem;
  padding:.8rem 1.5rem;border-radius:8px;font-weight:600;transition:all .15s
}
.contact-link-github{background:var(--surface);border:1px solid var(--border);color:var(--text)}
.contact-link-github:hover{border-color:var(--accent);color:var(--accent);text-decoration:none}
.contact-link-linkedin{background:var(--accent);color:#fff}
.contact-link-linkedin:hover{background:var(--accent-hover);text-decoration:none;color:#fff}

/* ── Footer ── */
.site-footer{
  border-top:1px solid var(--border);background:var(--surface);
  padding:2rem 0;margin-top:3rem
}
.site-footer .container{display:flex;justify-content:space-between;align-items:center}
.footer-name{font-weight:700}
.footer-role{font-size:.85rem;color:var(--text-muted)}
.footer-right{display:flex;gap:1rem}
.footer-right a{font-size:.9rem;color:var(--text-muted)}
.footer-right a:hover{color:var(--accent)}

/* ── Responsive ── */
@media (max-width:768px){
  .hero-name{font-size:1.8rem}
  .hero-buttons{flex-direction:column;align-items:center}
  .btn{width:80%;text-align:center}
  .nav-toggle{display:flex}
  .nav{
    display:none;position:absolute;top:56px;left:0;right:0;
    background:var(--surface);border-bottom:1px solid var(--border);
    flex-direction:column;padding:1rem;gap:0
  }
  .nav.open{display:flex}
  .nav a{padding:.75rem 0;border-bottom:1px solid var(--border)}
  .site-footer .container{flex-direction:column;gap:1rem;text-align:center}
}
@media (max-width:480px){
  .hero{padding:2rem 1rem}
  .hero-name{font-size:1.5rem}
  .post-title{font-size:1.5rem}
}
