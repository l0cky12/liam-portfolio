<footer class="site-footer">
  <div class="container">
    <div class="footer-left">
      <p class="footer-name">Liam Decareaux</p>
      <p class="footer-role">{{ .Site.Params.role }}</p>
    </div>
    <div class="footer-right">
      <a href="{{ .Site.Params.github }}" target="_blank" rel="noopener" aria-label="GitHub">GitHub</a>
      <a href="{{ .Site.Params.linkedin }}" target="_blank" rel="noopener" aria-label="LinkedIn">LinkedIn</a>
    </div>
  </div>
</footer>
<script>
// Mobile nav toggle
document.querySelector('.nav-toggle')?.addEventListener('click', function() {
  document.querySelector('.nav').classList.toggle('open');
});

// Theme toggle — dark is default; persists choice in localStorage
(function() {
  var toggle = document.getElementById('theme-toggle');
  if (!toggle) return;

  // Apply saved theme on load
  var saved = localStorage.getItem('theme');
  if (saved) {
    document.documentElement.setAttribute('data-theme', saved);
  }

  toggle.addEventListener('click', function() {
    var current = document.documentElement.getAttribute('data-theme');
    // If currently light (explicit or auto), switch to dark
    var isLight = current === 'light';
    if (!current) {
      // Check auto state via matchMedia
      isLight = window.matchMedia('(prefers-color-scheme: light)').matches;
    }
    var next = isLight ? 'dark' : 'light';
    document.documentElement.setAttribute('data-theme', next);
    localStorage.setItem('theme', next);
  });
})();
</script>
