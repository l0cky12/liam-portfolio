<header class="site-header">
  <div class="container">
    <a href="{{ "" | absURL }}" class="logo">Liam Decareaux</a>
    <nav class="nav">
      {{ range .Site.Menus.main }}
      <a href="{{ .URL | absURL }}" {{ if $.IsMenuCurrent "main" . }}class="active"{{ end }}>{{ .Name }}</a>
      {{ end }}
    </nav>
    <button class="nav-toggle" aria-label="Toggle navigation">
      <span></span><span></span><span></span>
    </button>
  </div>
</header>
